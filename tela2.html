<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<!-- ⚡ pré-carrega a próxima tela -->
<link rel="prefetch" href="tela3.html">
<title>Simulador de Sedução — Pergunta 1</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0A0A0C;
    --accent: #E8407A;
    --accent2: #7B5EFF;
    --white: #FFFFFF;
    --muted: #6B6B7A;
    --muted2: #3A3A4A;
    --glass: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.07);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
  }

  /* ── ORBS ── */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    pointer-events: none;
    z-index: 0;
  }
  .orb-1 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(232,64,122,0.14) 0%, transparent 70%);
    top: -100px; right: -80px;
    animation: orbPulse 6s ease-in-out infinite alternate;
  }
  .orb-2 {
    width: 350px; height: 350px;
    background: radial-gradient(circle, rgba(123,94,255,0.12) 0%, transparent 70%);
    bottom: -80px; left: -60px;
    animation: orbPulse 8s ease-in-out infinite alternate-reverse;
  }
  @keyframes orbPulse {
    from { transform: scale(1); opacity: 0.7; }
    to   { transform: scale(1.15); opacity: 1; }
  }

  /* ── FLOATING BUBBLES BG ── */
  .bg-canvas {
    position: fixed; inset: 0;
    overflow: hidden; pointer-events: none; z-index: 0;
  }
  .bubble {
    position: absolute;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    opacity: 0;
    animation: floatBubble linear infinite;
  }
  .bubble::after {
    content: '';
    position: absolute; width: 100%; height: 100%;
    border-radius: inherit;
    background: linear-gradient(135deg, rgba(232,64,122,0.05), rgba(123,94,255,0.05));
  }
  @keyframes floatBubble {
    0%   { opacity: 0; transform: translateY(20px); }
    10%  { opacity: 1; }
    85%  { opacity: 0.5; }
    100% { opacity: 0; transform: translateY(-60px); }
  }

  /* ── PAGE ── */
  .page {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 48px 24px 72px;
    gap: 0;
  }

  /* ── TOP PROGRESS ── */
  .top-bar {
    width: 100%; max-width: 400px;
    margin-bottom: 36px;
    opacity: 0;
    animation: fadeUp 0.5s ease forwards 0.05s;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .question-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .ranking-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(123,94,255,0.12);
    border: 1px solid rgba(123,94,255,0.22);
    border-radius: 100px;
    padding: 4px 11px;
    font-size: 11px;
    font-weight: 500;
    color: #A78BFA;
    white-space: nowrap;
  }
  .ranking-pill .dot {
    width: 5px; height: 5px;
    background: #7B5EFF;
    border-radius: 50%;
    box-shadow: 0 0 6px #7B5EFF;
  }

  .progress-track {
    width: 100%; height: 5px;
    background: var(--muted2);
    border-radius: 100px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #FF4D8D, #7B5EFF);
    border-radius: 100px;
    animation: fillProgress 1s cubic-bezier(0.16,1,0.3,1) forwards 0.6s;
  }
  @keyframes fillProgress { to { width: 20%; } }

  /* Step dots */
  .step-dots {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    justify-content: center;
  }
  .step-dot {
    width: 28px; height: 3px;
    border-radius: 100px;
    background: var(--muted2);
    transition: background 0.3s;
  }
  .step-dot.active {
    background: linear-gradient(90deg, #FF4D8D, #7B5EFF);
  }

  /* ── CHAT BUBBLE SCENARIO ── */
  .scenario-wrap {
    width: 100%; max-width: 400px;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.3s;
  }

  .scenario-label {
    font-size: 11px;
    font-weight: 400;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .scenario-label::before {
    content: '';
    display: block;
    width: 20px; height: 1px;
    background: var(--muted2);
  }

  .chat-window {
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 20px 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    position: relative;
    overflow: hidden;
  }

  .chat-window::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
  }

  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
  }

  .avatar-chat {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: linear-gradient(135deg, #FF7BAB, #E8407A);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: white;
    margin-bottom: 2px;
  }

  .msg-bubble {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 18px 18px 18px 4px;
    padding: 12px 16px;
    font-size: 22px;
    letter-spacing: 0.02em;
    color: var(--white);
    display: inline-block;
    position: relative;
    animation: bubblePop 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards 0.8s;
    transform: scale(0.8);
    opacity: 0;
  }

  @keyframes bubblePop {
    to { transform: scale(1); opacity: 1; }
  }

  .msg-time {
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
    margin-left: 40px;
  }

  /* Typing indicator */
  .typing-row {
    display: flex;
    align-items: center;
    gap: 10px;
    opacity: 0;
    animation: fadeIn 0.3s ease forwards 0.5s;
  }
  .typing-bubble {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 18px 18px 18px 4px;
    padding: 10px 14px;
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .typing-dot {
    width: 5px; height: 5px;
    background: var(--muted);
    border-radius: 50%;
    animation: typingBounce 1.2s ease infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingBounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40%            { transform: translateY(-5px); opacity: 1; }
  }
  @keyframes fadeIn { to { opacity: 1; } }

  /* ── QUESTION ── */
  .question-block {
    width: 100%; max-width: 400px;
    margin-bottom: 24px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.55s;
  }

  .question-text {
    font-family: 'Syne', sans-serif;
    font-size: clamp(20px, 5vw, 26px);
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.02em;
    color: var(--white);
  }

  .question-sub {
    font-size: 13px;
    color: var(--muted);
    margin-top: 6px;
    font-weight: 300;
  }

  /* ── OPTIONS ── */
  .options-wrap {
    width: 100%; max-width: 400px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.72s;
  }

  .option-btn {
    width: 100%;
    padding: 16px 20px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    color: rgba(255,255,255,0.75);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 400;
    text-align: left;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .option-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(232,64,122,0), rgba(123,94,255,0));
    border-radius: inherit;
    transition: background 0.25s ease;
  }

  .option-letter {
    flex-shrink: 0;
    width: 28px; height: 28px;
    border-radius: 8px;
    background: var(--muted2);
    border: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    transition: all 0.2s ease;
  }

  .option-text {
    flex: 1;
    line-height: 1.4;
  }

  .option-btn:hover {
    border-color: rgba(232,64,122,0.4);
    color: var(--white);
    transform: translateX(3px);
    box-shadow: 0 4px 20px rgba(232,64,122,0.12);
  }
  .option-btn:hover::before {
    background: linear-gradient(135deg, rgba(232,64,122,0.06), rgba(123,94,255,0.04));
  }
  .option-btn:hover .option-letter {
    background: rgba(232,64,122,0.2);
    border-color: rgba(232,64,122,0.4);
    color: #FF7BAB;
  }

  .option-btn.selected {
    border-color: rgba(232,64,122,0.6);
    color: var(--white);
    box-shadow: 0 4px 28px rgba(232,64,122,0.18);
  }
  .option-btn.selected::before {
    background: linear-gradient(135deg, rgba(232,64,122,0.1), rgba(123,94,255,0.07));
  }
  .option-btn.selected .option-letter {
    background: linear-gradient(135deg, #E8407A, #A855F7);
    border-color: transparent;
    color: white;
  }

  .option-btn.wrong {
    border-color: rgba(255,255,255,0.06);
    color: var(--muted);
    opacity: 0.5;
    transform: none;
  }

  /* ── FEEDBACK ── */
  .feedback-card {
    width: 100%; max-width: 400px;
    margin-top: 20px;
    background: rgba(123,94,255,0.08);
    border: 1px solid rgba(123,94,255,0.2);
    border-radius: 16px;
    padding: 18px 20px;
    display: none;
    opacity: 0;
    animation: fadeUp 0.5s ease forwards;
  }
  .feedback-card.visible { display: block; }

  .feedback-emoji { font-size: 24px; margin-bottom: 8px; }

  .feedback-title {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 4px;
  }
  .feedback-title .highlight {
    background: linear-gradient(90deg, #FF4D8D, #A855F7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .feedback-desc {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    line-height: 1.6;
    font-weight: 300;
  }

  .next-btn {
    width: 100%;
    margin-top: 14px;
    padding: 15px 24px;
    background: linear-gradient(135deg, #E8407A 0%, #A855F7 100%);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.01em;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    box-shadow: 0 6px 24px rgba(232,64,122,0.3);
  }
  .next-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
  }
  .next-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 32px rgba(232,64,122,0.4);
  }
  .next-btn:active { transform: translateY(0); }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%       { transform: translateX(-6px); }
    40%       { transform: translateX(6px); }
    60%       { transform: translateX(-4px); }
    80%       { transform: translateX(4px); }
  }

  ::-webkit-scrollbar { width: 0; }

  /* ============================================
     📱 MOBILE PERFORMANCE — só aplica no mobile
     Não afeta nada no desktop
  ============================================ */
  @media (max-width: 768px) {

    html, body {
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: none;
    }

    /* Blur mais leve nos orbs */
    .orb {
      filter: blur(60px);
      will-change: transform, opacity;
    }

    /* GPU na página inteira */
    .page {
      will-change: opacity, transform;
      transform: translateZ(0);
      -webkit-transform: translateZ(0);
      padding-bottom: max(72px, env(safe-area-inset-bottom));
    }

    /* Animações mais rápidas */
    .top-bar       { animation-duration: 0.35s !important; }
    .scenario-wrap { animation-duration: 0.35s !important; }
    .question-block{ animation-duration: 0.35s !important; }
    .options-wrap  { animation-duration: 0.35s !important; }

    /* Remove o ::after pesado das bolhas */
    .bubble::after { display: none; }

    /* Bolhas mais suaves */
    .bg-canvas { opacity: 0.5; }

    /* Toque sem delay nos botões */
    .option-btn, .next-btn {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* Remove hover (não existe no touch, evita bug de estado preso) */
    .option-btn:hover {
      transform: none;
      box-shadow: none;
      border-color: var(--glass-border);
      color: rgba(255,255,255,0.75);
    }
    .option-btn:hover::before {
      background: none;
    }
    .option-btn:hover .option-letter {
      background: var(--muted2);
      border-color: rgba(255,255,255,0.08);
      color: var(--muted);
    }

    /* Active state no toque — feedback visual rápido */
    .option-btn:active {
      transform: scale(0.98);
      border-color: rgba(232,64,122,0.4);
    }
  }

  /* Fade-in de entrada */
  body {
    opacity: 0;
    transition: opacity 0.25s ease;
  }
  body.page-ready {
    opacity: 1;
  }

  /* Transição de saída */
  body.page-exit {
    opacity: 0;
    transform: translateY(-8px);
    transition: opacity 0.18s ease, transform 0.18s ease;
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="bg-canvas" id="bgCanvas"></div>

<main class="page">

  <!-- TOP PROGRESS -->
  <div class="top-bar">
    <div class="progress-header">
      <span class="question-label">Pergunta 1 de 5</span>
      <span class="ranking-pill">
        <span class="dot"></span>
        Melhor que 64% das pessoas
      </span>
    </div>
    <div class="progress-track">
      <div class="progress-fill"></div>
    </div>
    <div class="step-dots">
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
      <div class="step-dot"></div>
      <div class="step-dot"></div>
      <div class="step-dot"></div>
    </div>
  </div>

  <!-- SCENARIO CHAT -->
  <div class="scenario-wrap">
    <p class="scenario-label">Ela respondeu</p>
    <div class="chat-window">

      <div class="typing-row" id="typingRow">
        <div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#FF7BAB,#E8407A);flex-shrink:0;"></div>
        <div class="typing-bubble">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>

      <div class="msg-row" id="msgRow" style="display:none;">
        <div class="avatar-chat">A</div>
        <div class="msg-bubble">kkkk</div>
      </div>
      <div class="msg-time" id="msgTime" style="display:none;">agora</div>

    </div>
  </div>

  <!-- QUESTION -->
  <div class="question-block">
    <p class="question-text">O que você responde?</p>
    <p class="question-sub">Escolha a opção que você usaria de verdade</p>
  </div>

  <!-- OPTIONS -->
  <div class="options-wrap" id="options">

    <button class="option-btn" data-answer="wrong" onclick="selectOption(this)">
      <span class="option-letter">A</span>
      <span class="option-text">kkkk vc ri de tudo?</span>
    </button>

    <button class="option-btn" data-answer="correct" onclick="selectOption(this)">
      <span class="option-letter">B</span>
      <span class="option-text">isso foi um sim disfarçado 😏</span>
    </button>

    <button class="option-btn" data-answer="wrong" onclick="selectOption(this)">
      <span class="option-letter">C</span>
      <span class="option-text">pq vc riu?</span>
    </button>

  </div>

  <!-- FEEDBACK -->
  <div class="feedback-card" id="feedbackCard">
    <div class="feedback-emoji" id="feedbackEmoji"></div>
    <p class="feedback-title" id="feedbackTitle"></p>
    <p class="feedback-desc" id="feedbackDesc"></p>
    <button class="next-btn" id="nextBtn">Próxima pergunta →</button>
  </div>

</main>

<script>
  /* ── Fade-in de entrada ── */
  requestAnimationFrame(() => {
    document.body.classList.add('page-ready');
  });

  /* ── BG bubbles (menos no mobile) ── */
  const canvas = document.getElementById('bgCanvas');
  const isMobile = window.innerWidth <= 768;

  if (canvas) {
    const all = [120,180,90,150,200,80,140,100,160,70];
    const list = isMobile ? all.slice(0, 5) : all;

    list.forEach((w, i) => {
      const el = document.createElement('div');
      el.className = 'bubble';
      el.style.cssText = `
        width:${w}px; height:36px;
        left:${Math.random()*90}%; top:${10+Math.random()*80}%;
        animation-duration:${isMobile ? 14+Math.random()*10 : 12+Math.random()*16}s;
        animation-delay:${Math.random()*-20}s;
        border-radius: ${i%2===0 ? '18px 18px 18px 4px' : '18px 18px 4px 18px'};
      `;
      canvas.appendChild(el);
    });
  }

  /* ── Typing → mensagem ── */
  setTimeout(() => {
    const typing = document.getElementById('typingRow');
    const msg    = document.getElementById('msgRow');
    const time   = document.getElementById('msgTime');
    if (typing) typing.style.display = 'none';
    if (msg)    msg.style.display    = 'flex';
    if (time)   time.style.display   = 'block';
  }, isMobile ? 1200 : 1800); /* Aparece mais rápido no mobile */

  /* ── Lógica das opções ── */
  let answered = false;

  function selectOption(el) {
    if (answered) return;
    answered = true;

    const isCorrect = el.dataset.answer === 'correct';
    const allBtns   = document.querySelectorAll('.option-btn');

    allBtns.forEach(btn => {
      btn.classList.add(btn === el ? 'selected' : 'wrong');
      btn.style.pointerEvents = 'none';
    });

    if (!isCorrect) {
      el.style.animation = 'shake 0.4s ease';
    }

    const card  = document.getElementById('feedbackCard');
    const emoji = document.getElementById('feedbackEmoji');
    const title = document.getElementById('feedbackTitle');
    const desc  = document.getElementById('feedbackDesc');

    if (card && emoji && title && desc) {
      if (isCorrect) {
        emoji.textContent = '🔥';
        title.innerHTML   = '<span class="highlight">Boa jogada.</span> Você entendeu.';
        desc.textContent  = 'Essa resposta mantém a tensão e o interesse.';
      } else {
        emoji.textContent = '😬';
        title.innerHTML   = 'Essa mata a conversa <span class="highlight">na hora.</span>';
        desc.textContent  = 'Resposta fraca = conversa morre.';
      }
      card.classList.add('visible');
    }
  }

  /* ── Próxima tela com transição suave ── */
  document.getElementById('nextBtn').addEventListener('click', function() {
    document.body.classList.add('page-exit');
    setTimeout(() => { window.location.href = 'tela3.html'; }, 180);
  });
</script>
</body>
</html>
